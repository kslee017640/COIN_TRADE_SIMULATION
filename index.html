<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업비트 실시간 시뮬레이터 (PWA)</title>
    <!-- PWA 설정을 위한 매니페스트 -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'코인시뮬','short_name':'코인시뮬','start_url':'.','display':'standalone','background_color':'#ffffff'}">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f7fa; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 18px; margin-top: 0; color: #333; }
        .price-info { font-size: 24px; font-weight: bold; color: #004ea1; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .strategy-box { padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .strategy-1 { background-color: #fff9f9; }
        .strategy-2 { background-color: #f9f9ff; }
        .status-label { font-size: 11px; color: #666; }
        .status-value { font-size: 15px; font-weight: bold; color: #2c3e50; }
        #chart { width: 100%; height: 350px; margin-top: 10px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
        .log { font-size: 11px; height: 120px; overflow-y: auto; background: #eee; padding: 8px; margin-top: 10px; border-radius: 5px; font-family: monospace; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #004ea1; font-size: 16px; margin-bottom: 10px; font-weight: bold; outline: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>종목 선택 (Upbit 실시간)</h2>
    <select id="coin-selector" onchange="changeCoin()">
        <option value="KRW-BTC">비트코인 (BTC)</option>
        <option value="KRW-ETH">이더리움 (ETH)</option>
        <option value="KRW-XRP">리플 (XRP)</option>
        <option value="KRW-DOGE">도지코인 (DOGE)</option>
    </select>
    <div id="current-price" class="price-info">데이터 연결 중...</div>
    <div id="last-update" style="font-size: 12px; color: #999;">로봇이 시장 상황을 분석 중입니다.</div>
</div>

<div class="card">
    <h2 id="strategy-title">비트코인 시뮬레이션 결과</h2>
    <div class="grid">
        <div class="strategy-box strategy-1">
            <div class="status-label">전략 1안 (-1.5/-3.0)</div>
            <div id="balance-1" class="status-value">1,000,000 원</div>
            <div id="asset-1" class="status-label">코인: 0개</div>
        </div>
        <div class="strategy-box strategy-2">
            <div class="status-label">전략 2안 (-1.5 전용)</div>
            <div id="balance-2" class="status-value">1,000,000 원</div>
            <div id="asset-2" class="status-label">코인: 0개</div>
        </div>
    </div>
</div>

<div class="card">
    <h2>실시간 차트 및 기록</h2>
    <div id="chart"></div>
    <div id="trade-log" class="log">로봇 가동 준비 완료...</div>
</div>

<script>
// --- [초등학생용] 각 종목별 가상 지갑 데이터예요 ---
const coinData = {
    "KRW-BTC": { balance1: 1000000, coin1: 0, balance2: 1000000, coin2: 0, logs: [] },
    "KRW-ETH": { balance1: 1000000, coin1: 0, balance2: 1000000, coin2: 0, logs: [] },
    "KRW-XRP": { balance1: 1000000, coin1: 0, balance2: 1000000, coin2: 0, logs: [] },
    "KRW-DOGE": { balance1: 1000000, coin1: 0, balance2: 1000000, coin2: 0, logs: [] }
};

let currentSelectedCoin = "KRW-BTC";

// --- 차트 설정 ---
const chartOptions = { 
    layout: { textColor: '#333', background: { type: 'solid', color: '#ffffff' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } }
};
const chart = LightweightCharts.createChart(document.getElementById('chart'), chartOptions);
const candleSeries = chart.addCandlestickSeries({
    upColor: '#e74c3c', downColor: '#2980b9', borderVisible: false, wickUpColor: '#e74c3c', wickDownColor: '#2980b9'
});

// --- [핵심 수정] 종목이 바뀌면 실행되는 마법 ---
function changeCoin() {
    // 1. 선택된 값 가져오기
    currentSelectedCoin = document.getElementById('coin-selector').value;
    const coinName = document.getElementById('coin-selector').options[document.getElementById('coin-selector').selectedIndex].text;
    
    // 2. UI 즉시 갱신
    document.getElementById('strategy-title').innerText = coinName + " 시뮬레이션 결과";
    document.getElementById('current-price').innerText = "데이터 갱신 중...";
    
    // 3. 차트 비우기 (중요!)
    candleSeries.setData([]);
    
    // 4. 지갑 정보 즉시 동기화
    updateUI(); 
    
    // 5. 즉시 데이터 불러오기
    updateSimulation(); 
}

// --- 업비트 데이터 배달 ---
async function fetchUpbitData(coin) {
    const apiUrl = `https://api.upbit.com/v1/candles/minutes/10?market=${coin}&count=200`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error("업비트 응답 없음");
    
    const rawData = await response.json();
    return rawData.reverse().map(item => ({
        time: Math.floor(new Date(item.candle_date_time_kst).getTime() / 1000),
        open: item.opening_price,
        high: item.high_price,
        low: item.low_price,
        close: item.trade_price
    }));
}

// --- 시뮬레이터 핵심 엔진 ---
async function updateSimulation() {
    const coins = Object.keys(coinData);
    
    // [수정] 현재 선택된 코인을 가장 먼저 처리하도록 순서 조정
    const sortedCoins = [currentSelectedCoin, ...coins.filter(c => c !== currentSelectedCoin)];

    for (const coin of sortedCoins) {
        try {
            const candles = await fetchUpbitData(coin);
            const currentPrice = candles[candles.length - 1].close;

            // [핵심 수정] 차트와 가격 텍스트는 현재 선택된 종목만 업데이트
            if (coin === currentSelectedCoin) {
                candleSeries.setData(candles);
                document.getElementById('current-price').innerText = currentPrice.toLocaleString() + " 원";
                document.getElementById('last-update').innerText = "최종 업데이트: " + new Date().toLocaleTimeString();
            }

            const closes = candles.map(c => c.close);
            
            // --- 지표 계산 (EMA 120 및 볼린저 밴드) ---
            const ema = closes.reduce((a, b) => a + b) / closes.length;
            const std = Math.sqrt(closes.map(x => Math.pow(x - ema, 2)).reduce((a, b) => a + b) / closes.length);

            const bands = {
                up3: ema + std * 3,
                up15: ema + std * 1.5,
                down15: ema - std * 1.5,
                down3: ema - std * 3
            };

            // --- [1안/2안 전략 로직] ---
            if (currentPrice <= bands.down15) {
                executeTrade(coin, 1, 'buy', 5000, currentPrice);
                if (currentPrice <= bands.down3) executeTrade(coin, 1, 'buy', 5000, currentPrice);
            } else if (currentPrice >= bands.up15) {
                executeTrade(coin, 1, 'sell', 5000, currentPrice);
                if (currentPrice >= bands.up3) executeTrade(coin, 1, 'sell', 5000, currentPrice);
            }

            if (currentPrice <= bands.down15) {
                executeTrade(coin, 2, 'buy', 5000, currentPrice);
            } else if (currentPrice >= bands.up15) {
                executeTrade(coin, 2, 'sell', 5000, currentPrice);
            }

            // 실시간으로 UI 갱신 (선택된 종목일 경우)
            if (coin === currentSelectedCoin) updateUI();

        } catch (e) {
            console.warn(coin + " 데이터 대기 중...");
        }
    }
}

function executeTrade(coinCode, strategyNum, type, amount, price) {
    const target = coinData[coinCode];
    const balKey = strategyNum === 1 ? 'balance1' : 'balance2';
    const coinKey = strategyNum === 1 ? 'coin1' : 'coin2';

    if (type === 'buy') {
        if (target[balKey] >= amount) {
            target[balKey] -= amount; 
            target[coinKey] += amount / price; 
            addTradeLog(coinCode, `[전략${strategyNum}] 매수: 5,000원`);
        }
    } else {
        if (target[coinKey] > 0) {
            const sellValue = Math.min(target[coinKey] * price, amount);
            target[balKey] += sellValue; 
            target[coinKey] -= sellValue / price; 
            addTradeLog(coinCode, `[전략${strategyNum}] 매도: ${Math.floor(sellValue).toLocaleString()}원`);
        }
    }
}

function updateUI() {
    const target = coinData[currentSelectedCoin];
    document.getElementById('balance-1').innerText = Math.floor(target.balance1).toLocaleString() + " 원";
    document.getElementById('asset-1').innerText = `코인: ${target.coin1.toFixed(6)}개`;
    document.getElementById('balance-2').innerText = Math.floor(target.balance2).toLocaleString() + " 원";
    document.getElementById('asset-2').innerText = `코인: ${target.coin2.toFixed(6)}개`;
    document.getElementById('trade-log').innerHTML = target.logs.length > 0 ? target.logs.join("") : "매매 기록이 없습니다."; 
}

function addTradeLog(coinCode, msg) {
    const now = new Date().toLocaleTimeString();
    const logEntry = `<div>[${now}] ${msg}</div>`;
    coinData[coinCode].logs.unshift(logEntry); 
    if (coinData[coinCode].logs.length > 20) coinData[coinCode].logs.pop(); 
}

// 1분마다 전체 종목 분석
setInterval(updateSimulation, 60000);
// 처음 시작
updateSimulation();
</script>
</body>
</html>
