<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 관제 스테이션 V5.2 (API Fix)</title>
    <!-- 그래프를 그려주는 마법 도구를 가져와요 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { 
            --main-blue: #3498db; 
            --up-red: #ff4d4d; 
            --down-blue: #2980b9; 
            --bg-color: #121212; 
            --card-color: #1e1e1e; 
            --text-color: #e0e0e0; 
            --border-color: #333333; 
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; overflow-x: hidden; }
        .card { background: var(--card-color); border-radius: 12px; padding: 18px; margin-bottom: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .control-panel { display: flex; flex-wrap: wrap; gap: 15px; background: #2c3e50; color: white; align-items: flex-end; }
        .setting-item { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        label { font-size: 11px; color: #bdc3c7; font-weight: bold; }
        select { padding: 10px; border-radius: 6px; border: none; font-size: 14px; background: #34495e; color: white; font-weight: bold; }
        .btn { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-sync { background: var(--main-blue); color: white; }
        .btn-reset { background: #e67e22; color: white; margin-left: 10px; }
        
        .btn-report { background: #9b59b6; color: white; margin-left: 10px; }
        .btn-scroll { background: #34495e; color: white; margin-left: 10px; border: 1px solid #7f8c8d; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--card-color); color: var(--text-color); }
        th, td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
        th { background: #2c3e50; color: #bdc3c7; }
        .coin-name { font-weight: bold; color: var(--main-blue); }
        .chart-container { width: 100%; height: 380px; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: var(--card-color); }
        .chart-title { font-size: 15px; font-weight: bold; margin-top: 20px; padding-left: 10px; border-left: 5px solid var(--main-blue); color: var(--text-color); }
        .log-area { font-size: 11px; height: 120px; overflow-y: auto; background: #000000; color: #00ff00; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: 'Consolas', monospace; border: 1px solid var(--border-color); }
        .status-bar { text-align: right; font-size: 11px; color: #7f8c8d; margin-bottom: 5px; }
        .eval-price { color: #888; font-size: 11px; margin-left: 5px; }
        .total-asset { font-weight: bold; color: #2ecc71; }
        #wake-lock-status { font-weight: bold; color: #f1c40f; margin-right: 10px; }

        #toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 14px; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-color); padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid var(--border-color); max-height: 80vh; overflow-y: auto; }
        .modal-close { float: right; cursor: pointer; font-size: 20px; color: #e74c3c; font-weight: bold; }
        .history-item { padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="toast">✅ 서버 데이터를 성공적으로 불러왔습니다!</div>

    <div id="report-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeReport()">X</span>
            <h3 style="margin-top:0;">📊 조건별 10일 성과 리포트</h3>
            <p style="font-size: 12px; color: #bdc3c7;">현재 설정 (기간: <span id="rep-ema"></span>분 / 금액: <span id="rep-unit"></span>원)</p>
            <div id="history-list"></div>
        </div>
    </div>

    <div class="card control-panel">
        <div class="setting-item">
            <label>⚙️ 볼린저 밴드 기간 설정 (60분 단위)</label>
            <select id="ema-period" onchange="changeParameters()">
                <option value="60">60분 (1시간)</option>
                <option value="120" selected>120분 (2시간)</option>
                <option value="180">180분 (3시간)</option>
                <option value="240">240분 (4시간)</option>
                <option value="360">360분 (6시간)</option>
            </select>
        </div>
        <div class="setting-item">
            <label>💰 1단위 매매 금액 설정</label>
            <select id="unit-amount" onchange="changeUnit()">
                <option value="5000" selected>5,000원</option>
                <option value="10000">10,000원</option>
                <option value="15000">15,000원</option>
                <option value="20000">20,000원</option>
                <option value="25000">25,000원</option>
                <option value="30000">30,000원</option>
            </select>
        </div>
        <div style="display: flex; align-items: center;">
            <span id="wake-lock-status">📱 화면 유지 준비 중...</span>
            <button class="btn btn-sync" onclick="manualSync()">☁️ 클라우드 백업</button>
            <button class="btn btn-report" onclick="openReport()">📊 실적 리포트</button>
            <button class="btn btn-scroll" id="scroll-btn" onclick="toggleScroll()">↕️ 자동 스크롤: 켜짐</button>
            <button class="btn btn-reset" onclick="resetData()">🔄 초기화</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 통합 실시간 잔고 (시작: 현금 100만 + 코인 100만)</h3>
        <div class="status-bar" id="sync-status">연결 대기 중...</div>
        <table id="result-table">
            <thead>
                <tr>
                    <th>종목</th>
                    <th>현재가</th>
                    <th>보유 현금</th>
                    <th>보유 코인 (평가금액)</th>
                    <th>총 자산 (현금+코인)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="charts-area"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzk3RlYiDQtn0_iyDwHIpAGYoVOM3YY8ELyJ-GXCvhtAzDWF2QOM-uBnBNRkln_RjLjSw/exec";
const coins = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-DOGE"];
const coinNames = {"KRW-BTC": "비트코인", "KRW-ETH": "이더리움", "KRW-XRP": "리플", "KRW-DOGE": "도지코인"};
let coinData = {};
let chartObjects = {};
let emaWindow = 120;
let unitAmount = 5000; 
let wakeLock = null;

let isAutoScrolling = true;
let scrollStep = 0.5; 

setInterval(() => {
    if (!isAutoScrolling) return;
    window.scrollBy(0, scrollStep);
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 2) scrollStep = -0.5;
    else if (window.scrollY <= 0) scrollStep = 0.5;
}, 50);

function toggleScroll() {
    isAutoScrolling = !isAutoScrolling;
    document.getElementById('scroll-btn').innerText = isAutoScrolling ? "↕️ 자동 스크롤: 켜짐" : "↕️ 자동 스크롤: 꺼짐";
    document.getElementById('scroll-btn').style.background = isAutoScrolling ? "#34495e" : "#e74c3c";
}

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('wake-lock-status').innerText = "🌞 화면 유지 중";
        }
    } catch (err) {
        document.getElementById('wake-lock-status').innerText = "🚫 유지 불가";
    }
}
document.addEventListener('click', requestWakeLock);
document.addEventListener('visibilitychange', () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
    }
});

function initData() {
    const saved = localStorage.getItem('crypto_sim_v4_4');
    if (saved) { 
        coinData = JSON.parse(saved); 
        coins.forEach(s => { if(!coinData[s].markers) coinData[s].markers = []; });
        if (coinData.globalUnit) {
            unitAmount = coinData.globalUnit;
            document.getElementById('unit-amount').value = unitAmount;
        }
        if (!coinData.performanceHistory) coinData.performanceHistory = {};
    } else { 
        coins.forEach(s => {
            coinData[s] = {
                balance: 1000000, coin: 0, lastPrice: 0, logs: [], markers: [], isNewAccount: true 
            };
        });
        coinData.globalUnit = 5000;
        coinData.performanceHistory = {};
    }
    
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 1000);
}

function resetData() {
    if(confirm("모든 데이터를 초기화하고 다시 시작할까요?")) {
        localStorage.removeItem('crypto_sim_v4_4');
        location.reload();
    }
}

async function cloudSync() {
    try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'sync', data: coinData }) });
        document.getElementById('sync-status').innerText = `✅ 동기화 완료 (${new Date().toLocaleTimeString()})`;
    } catch (e) { document.getElementById('sync-status').innerText = "⚠️ 동기화 실패"; }
}

function manualSync() { cloudSync(); alert("데이터를 전송했습니다."); }

function initCharts() {
    const area = document.getElementById('charts-area');
    coins.forEach(symbol => {
        const title = document.createElement('div');
        title.className = 'chart-title';
        title.innerText = `📈 ${coinNames[symbol]} (${symbol})`;
        const container = document.createElement('div');
        container.className = 'chart-container';
        const logArea = document.createElement('div');
        logArea.id = `log-${symbol}`;
        logArea.className = 'log-area';
        area.appendChild(title);
        area.appendChild(container);
        area.appendChild(logArea);

        const chart = LightweightCharts.createChart(container, {
            layout: { 
                background: { type: 'solid', color: '#1e1e1e' },
                textColor: '#d1d4dc' 
            },
            grid: { 
                vertLines: { color: '#333' }, 
                horzLines: { color: '#333' } 
            },
            localization: {
                timeFormatter: time => {
                    const date = new Date(time * 1000);
                    return date.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit' });
                }
            },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        
        chartObjects[symbol] = {
            chart: chart,
            candle: chart.addCandlestickSeries({ upColor: '#e74c3c', downColor: '#2980b9' }),
            up3: chart.addLineSeries({ color: '#27ae60', lineWidth: 2 }),
            up15: chart.addLineSeries({ color: '#a2dd71', lineWidth: 2 }),
            mid: chart.addLineSeries({ color: '#f1c40f', lineWidth: 2 }),
            down15: chart.addLineSeries({ color: '#e67e22', lineWidth: 2 }),
            down3: chart.addLineSeries({ color: '#e74c3c', lineWidth: 2 })
        };
    });
}

function calculateEMA(data, window) {
    const k = 2 / (window + 1);
    let emaArray = [data[0]];
    for (let i = 1; i < data.length; i++) emaArray.push(data[i] * k + emaArray[i - 1] * (1 - k));
    return emaArray;
}

function calculateRollingStd(data, window, width) {
    let stdArray = [];
    for (let i = 0; i < data.length; i++) {
        const start = Math.max(0, i - width + 1);
        const subset = data.slice(start, i + 1);
        const mean = subset.reduce((a, b) => a + b, 0) / subset.length;
        const variance = subset.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / subset.length;
        stdArray.push(Math.sqrt(variance));
    }
    return stdArray;
}

function changeParameters() {
    emaWindow = parseInt(document.getElementById('ema-period').value);
    runCycle();
}

function changeUnit() {
    unitAmount = parseInt(document.getElementById('unit-amount').value);
    coinData.globalUnit = unitAmount;
    localStorage.setItem('crypto_sim_v4_4', JSON.stringify(coinData));
}

async function runCycle() {
    for (const symbol of coins) {
        try {
            // [수정된 부분!] 
            // 업비트 서버가 화내지 않게, 각 코인을 물어보기 전에 0.5초(500ms)씩 잠깐 쉬어줍니다.
            await new Promise(resolve => setTimeout(resolve, 500));

            const apiUrl = `https://api.upbit.com/v1/candles/minutes/10?market=${symbol}&count=200`;
            const response = await fetch(apiUrl);
            const json = await response.json(); 
            
            if (!json || json.length === 0) throw new Error("데이터 응답 없음");
            
            const rawData = json.reverse().map(item => ({
                time: Math.floor(new Date(item.candle_date_time_kst + '+09:00').getTime() / 1000),
                open: item.opening_price, high: item.high_price, low: item.low_price, close: item.trade_price
            }));

            const closes = rawData.map(c => c.close);
            const emaCount = Math.floor(emaWindow / 10);
            const emaValues = calculateEMA(closes, emaCount);
            const stdValues = calculateRollingStd(closes, emaCount, emaCount);

            const obj = chartObjects[symbol];
            const target = coinData[symbol];
            
            obj.candle.setData(rawData);
            obj.up3.setData(rawData.map((c, i) => ({ time: c.time, value: emaValues[i] + stdValues[i] * 3 })));
            obj.up15.setData(rawData.map((c, i) => ({ time: c.time, value: emaValues[i] + stdValues[i] * 1.5 })));
            obj.mid.setData(rawData.map((c, i) => ({ time: c.time, value: emaValues[i] })));
            obj.down15.setData(rawData.map((c, i) => ({ time: c.time, value: emaValues[i] - stdValues[i] * 1.5 })));
            obj.down3.setData(rawData.map((c, i) => ({ time: c.time, value: emaValues[i] - stdValues[i] * 3 })));

            obj.candle.setMarkers(target.markers || []);
            obj.chart.timeScale().fitContent();

            const curPrice = rawData[rawData.length - 1].close;
            const curTime = rawData[rawData.length - 1].time; 
            target.lastPrice = curPrice;
            target.lastTime = curTime; 

            if (target.isNewAccount) {
                target.coin = 1000000 / curPrice;
                addLog(symbol, `🚀 시뮬레이션 시작: 100만 원어치 코인 초기 보유 완료`);
                delete target.isNewAccount;
            }

            const lastIdx = emaValues.length - 1;
            const mid = emaValues[lastIdx];
            const std = stdValues[lastIdx];
            const up3 = mid + std * 3;
            const up15 = mid + std * 1.5;
            const down15 = mid - std * 1.5;

            if (curPrice >= up3) {
                execute(symbol, 'sell', unitAmount * 2, curPrice);
            } else if (curPrice >= up15) {
                execute(symbol, 'sell', unitAmount, curPrice);
            } else if (curPrice <= down15) {
                execute(symbol, 'buy', unitAmount * 2, curPrice);
            } else if (curPrice <= mid) {
                execute(symbol, 'buy', unitAmount, curPrice);
            }

        } catch (e) { console.error(symbol + " 오류:", e); }
    }
    
    updateUI();
    saveDailyPerformance(); 
    localStorage.setItem('crypto_sim_v4_4', JSON.stringify(coinData));
}

function execute(symbol, type, krw, price) {
    const data = coinData[symbol];
    if (type === 'buy' && data.balance >= krw) {
        data.balance -= krw; data.coin += krw / price;
        addLog(symbol, `🟢 매수: ${krw.toLocaleString()}원 (가격: ${price.toLocaleString()})`);
        
        data.markers.push({
            time: data.lastTime,
            position: 'belowBar',
            color: '#2ecc71',
            shape: 'star',
            text: '매수'
        });
    } else if (type === 'sell' && data.coin > 0) {
        const sellAmt = Math.min(data.coin * price, krw);
        data.balance += sellAmt; data.coin -= sellAmt / price;
        addLog(symbol, `🔴 매도: ${Math.floor(sellAmt).toLocaleString()}원 (가격: ${price.toLocaleString()})`);
        
        data.markers.push({
            time: data.lastTime,
            position: 'aboveBar',
            color: '#e74c3c',
            shape: 'star',
            text: '매도'
        });
    }
}

function addLog(symbol, msg) {
    const time = new Date().toLocaleTimeString();
    coinData[symbol].logs.unshift(`[${time}] ${msg}`);
    if (coinData[symbol].logs.length > 20) coinData[symbol].logs.pop();
}

function updateUI() {
    const tbody = document.querySelector('#result-table tbody');
    tbody.innerHTML = '';
    coins.forEach(symbol => {
        const d = coinData[symbol];
        const evalPrice = Math.floor(d.coin * d.lastPrice);
        const totalAsset = Math.floor(d.balance + evalPrice);

        tbody.innerHTML += `<tr>
            <td class="coin-name">${coinNames[symbol]}</td>
            <td>${d.lastPrice.toLocaleString()}원</td>
            <td>${Math.floor(d.balance).toLocaleString()}원</td>
            <td>${d.coin.toFixed(6)} <span class="eval-price">(${evalPrice.toLocaleString()}원)</span></td>
            <td class="total-asset">${totalAsset.toLocaleString()}원</td>
        </tr>`;
        document.getElementById(`log-${symbol}`).innerHTML = d.logs.join('<br>');
    });
}

function saveDailyPerformance() {
    const today = new Date().toLocaleDateString('ko-KR'); 
    const conditionKey = `${emaWindow}분_${unitAmount}원`; 
    
    let totalPortfolioValue = 0;
    coins.forEach(symbol => {
        totalPortfolioValue += Math.floor(coinData[symbol].balance + (coinData[symbol].coin * coinData[symbol].lastPrice));
    });

    if (!coinData.performanceHistory[conditionKey]) {
        coinData.performanceHistory[conditionKey] = [];
    }
    
    let historyList = coinData.performanceHistory[conditionKey];
    
    const todayRecordIndex = historyList.findIndex(item => item.date === today);
    if (todayRecordIndex !== -1) {
        historyList[todayRecordIndex].asset = totalPortfolioValue;
    } else {
        historyList.push({ date: today, asset: totalPortfolioValue });
        if (historyList.length > 10) historyList.shift(); 
    }
}

function openReport() {
    document.getElementById('report-modal').style.display = 'flex';
    document.getElementById('rep-ema').innerText = emaWindow;
    document.getElementById('rep-unit').innerText = unitAmount.toLocaleString();
    
    const conditionKey = `${emaWindow}분_${unitAmount}원`;
    const listDiv = document.getElementById('history-list');
    listDiv.innerHTML = '';
    
    const historyList = coinData.performanceHistory[conditionKey] || [];
    if(historyList.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; color:#7f8c8d;">아직 기록된 실적이 없습니다. 프로그램을 계속 켜두세요!</p>';
    } else {
        historyList.slice().reverse().forEach(record => {
            listDiv.innerHTML += `
                <div class="history-item">
                    <span>📅 ${record.date}</span>
                    <span style="color:#2ecc71; font-weight:bold;">${record.asset.toLocaleString()} 원</span>
                </div>
            `;
        });
    }
}

function closeReport() {
    document.getElementById('report-modal').style.display = 'none';
}

setInterval(runCycle, 600000); 
setInterval(cloudSync, 3600000); 

initData();
initCharts();
runCycle(); 
requestWakeLock();
</script>
</body>
</html>
